<!DOCTYPE html>
<html>
<head>
<title>Contact - V NOIR CAFÉ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#0f0f0f;
    color:#f5f1e8;
}

/* NAVIGATION */
nav{
    background:#1c1c1c;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h1{
    font-family:'Playfair Display', serif;
    color:#d4af37;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:#f5f1e8;
}

nav ul li a:hover{
    color:#d4af37;
}

/* SECTION */
.section{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
}

/* CONTACT BOX */
.contact-box{
    background:#1c1c1c;
    padding:40px;
    width:100%;
    max-width:500px;
    border-radius:12px;
    border:2px solid #d4af37;   /* ✅ GOLD BORDER ADDED */
}

.contact-box h2{
    font-family:'Playfair Display', serif;
    color:#d4af37;
    margin-bottom:25px;
    text-align:center;
}

/* LABELS */
.contact-box label{
    font-weight:600;   /* ✅ BOLD TEXT */
    display:block;
    margin-bottom:6px;
}

/* INPUT FIELDS */
.contact-box input,
.contact-box textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
    background:#2a2a2a;
    color:#f5f1e8;
}

.contact-box input:focus,
.contact-box textarea:focus{
    outline:2px solid #d4af37;
}

/* BUTTON */
.contact-box button{
    width:100%;
    padding:12px;
    background:#d4af37;
    border:none;
    font-weight:600;
    cursor:pointer;
    border-radius:6px;
}

.contact-box button:hover{
    background:#b9962e;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#1c1c1c;
    margin-top:50px;
}
</style>
</head>

<body>

<nav>
<h1>V NOIR CAFÉ</h1>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="order.html">Order</a></li>
</ul>
</nav>

<section class="section">

<div class="contact-box">
<h2>Contact Us</h2>

<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Contact Number" required>
<textarea placeholder="Feedback" rows="5"></textarea>
<button type="submit">Connnect</button>
</form>

</div>

</section>

<footer>
We look forward to serving you ☕
</footer>

</body>
</html>
